name: Auto Merge Dependabot PRs

on:
  workflow_run:
    workflows:
      - Dependabot Build
    types:
      - completed
    branches:
      - nightly

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Merge successful Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BRANCH=$(jq -r '.workflow_run.head_branch // empty' "$GITHUB_EVENT_PATH")

          if [ -z "$PR_BRANCH" ]; then
            echo "No branch was associated with this workflow run."
            exit 0
          fi

          case "$PR_BRANCH" in
            dependabot/*) ;;
            *)
              echo "Skipping non-Dependabot branch $PR_BRANCH."
              exit 0
              ;;
          esac

          PR_NUMBER=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$PR_BRANCH" \
            --base nightly \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open nightly Dependabot PR found for $PR_BRANCH."
            exit 0
          fi

          gh pr merge --repo "$GITHUB_REPOSITORY" --squash --delete-branch "$PR_NUMBER"

name: Dependabot Build

on:
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    container: eclipse-temurin:21-jdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Checks
        run: ./gradlew --stacktrace -PjavafxPlatform=linux build
